            - heading "說明" [level=2] [ref=e88]
            - paragraph [ref=e90]: 此2021年人口普查數據集包含在2021年居於18個區議會分區的香港人口有關人口、住戶、教育、經濟、房屋及內部遷移特徵的統計數字。此數據集亦包含各區議會分區的分界。自1961年起，香港每10年進行一次人口普查，並在兩次人口普查之間進行一次中期人口統計。2021年人口普查於2021年6月至8月期間進行，提供了香港人口的社會和經濟特徵的基準統計數字。這些數字對政府在規劃和制定政策尤為重要。這個數據集將被納入人口分布框架空間數據主題集。
